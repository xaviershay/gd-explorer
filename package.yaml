name: gd-explorer
version: 0.1.0.0
github: "githubuser/gd-explorer"
license: BSD-3-Clause
author: "Author name here"
maintainer: "example@example.com"
copyright: "2026 Author name here"

extra-source-files:
    - README.md
    - CHANGELOG.md

description: Please see the README on GitHub at <https://github.com/githubuser/gd-explorer#readme>

dependencies:
    - base >= 4.7 && < 5

default-extensions:
    - OverloadedStrings
    - LambdaCase
    - ScopedTypeVariables
    - TupleSections
    - BangPatterns
    - RecordWildCards
    - MultiWayIf

ghc-options:
    - -Wall
    - -Wcompat
    - -Widentities
    - -Wincomplete-record-updates
    - -Wincomplete-uni-patterns
    - -Wmissing-home-modules
    - -Wpartial-fields
    - -Wredundant-constraints

library:
    source-dirs: src
    c-sources:
        - cbits/lz4_shim.c
    dependencies:
        - aeson
        - bytestring
        - containers
        - unordered-containers
        - text
        - vector
        - directory
        - filepath
        - mtl
        - optparse-applicative

internal-libraries:
    web:
        source-dirs: src-web
        dependencies:
            - gd-explorer
            - aeson
            - bytestring
            - directory
            - filepath
            - http-types
            - JuicyPixels
            - scotty
            - text
            - unordered-containers
            - vector
            - wai
            - wai-app-static
            - warp

    oa-da-fit-lib:
        source-dirs: debug
        dependencies:
            - gd-explorer
            - text

executables:
    gd-explorer:
        main: Main.hs
        source-dirs: app
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - gd-explorer
            - gd-explorer:web
            - optparse-applicative
            - text

    oa-da-fit:
        main: Main.hs
        source-dirs: debug-app
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - base
            - gd-explorer
            - gd-explorer:oa-da-fit-lib
            - text

tests:
    gd-explorer-test:
        main: Spec.hs
        source-dirs: test
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - gd-explorer
            - gd-explorer:web
            - gd-explorer:oa-da-fit-lib
            - aeson
            - hspec
            - bytestring
            - containers
            - unordered-containers
            - text
            - directory
            - filepath
            - JuicyPixels
            - optparse-applicative
